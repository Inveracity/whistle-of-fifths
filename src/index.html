<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whistle of Fifths</title>
    <link rel="stylesheet" href="style.css" />
    <script>(() => { var t = localStorage.getItem("theme"); if (t) document.documentElement.dataset.theme = t; })();</script>
</head>

<body>
    <div class="layout">
        <div class="topbar">
            <nav id="nav" class="nav"></nav>
            <header class="header">
                <h1 class="title">Whistle of Fifths</h1>
                <p class="subtitle">Handy whistle tool for musicians</p>
            </header>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle colour scheme"></button>
        </div>
        <div id="page-circle" class="page">
            <main class="main">
                <div class="circle-wrapper">
                    <svg id="circle" class="circle-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg"
                        aria-label="Circle of fifths" role="img"></svg>
                </div>
                <div class="selector-wrapper">
                    <span class="selector-label">Whistle key</span>
                    <div id="selector" class="selector"></div>
                </div>
            </main>
        </div>
        <div id="page-tabs" class="page page--hidden"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>

</html>
